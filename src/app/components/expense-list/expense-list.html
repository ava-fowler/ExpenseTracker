<div class="container mt-4">
  <h2>All Expenses</h2>

  <div class="mt-3">
    @if (expenseService.expenses().length === 0) {
      <div class="alert alert-info">No expenses available. Please add a new expense.</div>
    } @else {
      <div class="list-group">
        @for (expense of expenseService.expenses(); track expense.id) {
          <app-expense-item [expense]="expense"></app-expense-item>
        }
      </div>
    }
  </div>
</div>
