<div class="list-container">
  <h2>Your Expenses</h2>

  <!-- Filters -->
  <div class="mb-3">
    <input
      type="text"
      class="form-control mb-2"
      placeholder="Search by title"
      [ngModel]="searchTerm()"
      (ngModelChange)="searchTerm.set($event)"
    />

    <select
      class="form-select mb-2"
      [ngModel]="selectedCategory()"
      (ngModelChange)="selectedCategory.set($event)"
    >
      <option value="">All Categories</option>
      <option *ngFor="let c of expenseService.categories()" [value]="c">{{ c }}</option>
    </select>

    <input
      type="date"
      class="form-control mb-2"
      [ngModel]="startDate()"
      (ngModelChange)="startDate.set($event)"
    />

    <div class="d-flex gap-2">
      <input
        type="number"
        class="form-control"
        placeholder="Min amount"
        [ngModel]="minAmount()"
        (ngModelChange)="minAmount.set($event ? +$event : null)"
      />
      <input
        type="number"
        class="form-control"
        placeholder="Max amount"
        [ngModel]="maxAmount()"
        (ngModelChange)="maxAmount.set($event ? +$event : null)"
      />
    </div>
  </div>

  <div *ngIf="filteredExpenses().length === 0">
    <p>No expenses found.</p>
  </div>

  <div *ngFor="let e of filteredExpenses()" class="expense-item">
    <div class="info">
      <h3>{{ e.title }}</h3>
      <p>
        <span
          [style.background-color]="expenseService.getColor(e.category)"
          style="
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-right: 6px;
          "
        >
          {{ expenseService.getIcon(e.category) }}
        </span>
        {{ e.category }} • {{ e.date }}
      </p>
    </div>

    <div class="amount">${{ e.amount }}</div>

    <div class="actions">
      <button (click)="edit(e.id!)">Edit</button>
      <button (click)="delete(e.id!)" class="danger">Delete</button>
    </div>
  </div>
</div>
