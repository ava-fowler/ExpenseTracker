<div class="container mt-4">
  <h2>Budget Planning</h2>

  <!-- Add Budget Form -->
  <div class="card mt-3">
    <div class="card-body">
      <h5>Set a Budget</h5>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-select" [(ngModel)]="newCategory">
          <option value="">Select category</option>
          <option *ngFor="let c of predefinedCategories" [value]="c">{{ c }}</option>
          <option *ngFor="let uc of userCategories" [value]="uc.name">{{ uc.name }}</option>
        </select>
      </div>

      <div class="mb-3">
        <label class="form-label">Monthly Budget Amount</label>
        <input type="number" class="form-control" [(ngModel)]="newAmount" />
      </div>

      <button class="btn btn-primary" (click)="addBudget()">Save Budget</button>
    </div>
  </div>

  <!-- Budget List -->
  <div class="mt-4">
    <h5>Your Budgets</h5>

    <div *ngIf="budgets.length === 0">
      <p>No budgets set yet.</p>
    </div>

    <div *ngFor="let b of budgets" class="card mt-2">
      <div class="card-body">
        <div class="d-flex justify-content-between align-items-center">
          <h6>
            <span
              [style.background-color]="expenseService.getColor(b.category)"
              style="
                width: 28px;
                height: 28px;
                border-radius: 50%;
                display: inline-flex;
                align-items: center;
                justify-content: center;
                margin-right: 8px;
              "
            >
              {{ expenseService.getIcon(b.category) }}
            </span>
            {{ b.category }}
          </h6>
          <button class="btn btn-danger btn-sm" (click)="deleteBudget(b.id!)">Delete</button>
        </div>

        <p>Budget: ${{ b.amount }} | Spent: ${{ getSpent(b.category) }}</p>

        <div class="progress">
          <div
            class="progress-bar"
            [style.width.%]="(getSpent(b.category) / b.amount) * 100"
            [class.bg-danger]="isOverBudget(b)"
            [class.bg-warning]="isNearBudget(b)"
            [class.bg-success]="!isNearBudget(b) && !isOverBudget(b)"
          ></div>
        </div>

        <p *ngIf="isOverBudget(b)" class="text-danger mt-2">⚠️ You have exceeded your budget!</p>
        <p *ngIf="isNearBudget(b)" class="text-warning mt-2">⚠️ You are nearing your budget!</p>
      </div>
    </div>
  </div>
</div>
