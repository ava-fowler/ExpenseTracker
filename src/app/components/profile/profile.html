<div class="container mt-4">
  <h2>User Profile</h2>

  <div class="card mt-3">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Name</label>
        <input type="text" class="form-control" [(ngModel)]="profile.name" />
      </div>

      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="text" class="form-control" [value]="profile.email" disabled />
      </div>

      <div class="mb-3">
        <label class="form-label">Monthly Budget Goal</label>
        <input type="number" class="form-control" [(ngModel)]="profile.budgetGoal" />
      </div>

      <button class="btn btn-primary" (click)="saveProfile()">Save Profile</button>
    </div>
  </div>
</div>
