<div class="container mt-4">
  <h2>Add Expense</h2>

  <div class="card mt-3">
    <div class="card-body">
      <div class="mb-3">
        <label class="form-label">Title</label>
        <input type="text" class="form-control" [(ngModel)]="title" />
      </div>

      <div class="mb-3">
        <label class="form-label">Amount</label>
        <input type="number" class="form-control" [(ngModel)]="amount" />
      </div>

      <div class="mb-3">
        <label class="form-label">Category</label>
        <select class="form-select" [(ngModel)]="category">
          <option value="">Select category</option>
          <option *ngFor="let c of expenseService.categories()">
            {{ c }}
          </option>
        </select>
      </div>

      <button class="btn btn-primary" (click)="addExpense()">Add Expense</button>
    </div>
  </div>
</div>
